<div class="container">
    <h1>List des formations disponibles</h1>
    <div *ngFor="let item of formationListData">
      <mat-card class="mb-3">
        <mat-card-header>
          <mat-card-title>{{ item.schoolName }}</mat-card-title>
          <mat-card-subtitle>{{ item.formationName }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <p>{{ item.diplomaName }}</p>
          <p>{{ item.city }}</p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button 
          [routerLink]="['/school-detail', item.formationId]" >Voir le détail</button>
        </mat-card-actions>
      </mat-card>
    </div>
    </div>
