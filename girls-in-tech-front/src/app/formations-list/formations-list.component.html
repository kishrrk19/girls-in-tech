<div *ngIf="spin" class="spinner-container">
  <mat-spinner></mat-spinner>
</div>

<div *ngIf="!spin">
  <div class="container">
    <h1 class="mt-2">Resultat des formations de ta requête :</h1>
    <h2 #topOfResult><span>Mots clés : </span><span *ngFor="let key of queryKeys; let i = index"><span>{{key}}<span
            *ngIf="i < queryKeys.length - 1">, </span></span></span>
    </h2>

    <ng-container *ngIf="!noResult">
      <div *ngFor="let item of formationsResultList">
        <mat-card class="mb-3">
          <mat-card-header>
            <mat-card-title>{{ item.schoolName }}</mat-card-title>
            <mat-card-subtitle>{{ item.formationName }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-content>
            <p>{{ item.city }}</p>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button (click)="openDetail(item.id)">Voir le détail</button>
          </mat-card-actions>
        </mat-card>
      </div>
      <mat-paginator [length]="total" [pageSize]="5" [pageSizeOptions]="[5, 10, 25]" (page)="onPageChange($event)"
        aria-label="Select page">
      </mat-paginator>

    </ng-container>
    <div *ngIf="noResult">
      <h2>Il n'y a pas de formations associés à ta recherche</h2>
    </div>
  </div>
</div>
