<div class="container">
<h1>Resultat des formations de votre requête :</h1>
<h2><span>Mots clés : </span><span *ngFor="let key of queryKeys; let i = index"><span>{{key}}<span *ngIf="i < queryKeys.length - 1">, </span></span></span>
</h2>

<div *ngFor="let item of formationsResultList">
  <mat-card class="mb-3">
    <mat-card-header>
      <mat-card-title>{{ item.schoolName }}</mat-card-title>
      <mat-card-subtitle>{{ item.formationName }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{ item.city }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button 
      (click)="openDetail(item.id)" >Voir le détail</button>
    </mat-card-actions>
  </mat-card>
</div>
</div>
