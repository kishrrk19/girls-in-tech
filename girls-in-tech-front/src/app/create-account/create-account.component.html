<h1 class="text-center mt-3">Créer votre compte</h1>
<div class="container" id="container">
  <form class="d-flex flex-column mx-3" [formGroup]="accountCreationForm" (ngSubmit)="onSubmit()">
    <mat-form-field>
      <mat-label>Votre adress mail</mat-label>
      <input matInput placeholder="bonjour@example.com" formControlName="username" required />
      <mat-error *ngIf="accountCreationForm.get('username')?.invalid">{{ errorMessage }}</mat-error>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Mot de passe</mat-label>
      <input matInput type="password" formControlName="password" required />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Votre Nom</mat-label>
      <input matInput placeholder="Dupont" formControlName="lastName" required />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Votre Prénom</mat-label>
      <input matInput placeholder="Marie" formControlName="firstName" required />
    </mat-form-field>
    <label class="mb-2">Votre status</label>
    <mat-radio-group formControlName="roleId" class="d-flex flex-row mb-3 radio-group">
      <mat-radio-button [value]="2">Collégienne / Lycéenne</mat-radio-button>
      <mat-radio-button [value]="3">Alumni</mat-radio-button>
    </mat-radio-group>
    <div class="d-flex justify-content-center m-4">
      <button class="btn btn-primary">Creer</button>
    </div>
  </form>
</div>
