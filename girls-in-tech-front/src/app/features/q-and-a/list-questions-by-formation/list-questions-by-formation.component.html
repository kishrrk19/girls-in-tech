<div class="d-flex justify-content-between">
    <h2 class="mt-3">Q & A</h2><button class="mt-3" mat-raised-button (click)="askQuestion()">Poser une
        question</button>
</div>
<div *ngFor="let item of questionsListData">
    <mat-card class="mb-3">
        <mat-card-header>
            <mat-card-title>{{ item.title }}</mat-card-title>
            <mat-card-subtitle>{{ item.createdAt |date: 'dd/MM/yyyy HH:mm'}}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-actions>
            <button mat-button (click)="openDetail(item)">Voir le détail</button>
        </mat-card-actions>
    </mat-card>
</div>
<div class="mb-3" *ngIf="questionsListData.length == 0">
    <h3>Il n'y a pas encore de question.</h3>
</div>
